<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abe's Pro Arcade - Infinite Levels</title>
    
    <script async="async" data-cfasync="false" src="https://pl29525689.effectivecpmnetwork.com/d9c95bb7e605081de3e961cccc14a6a6/invoke.js"></script>

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #e94560; --neon-gold: #ffd700; }
        body { margin: 0; padding: 0; overflow: hidden; background: #050510; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui { 
            position: absolute; top: 0; width: 100%; display: flex; 
            justify-content: space-around; padding: 15px 0;
            color: var(--neon-blue); font-size: 18px; font-weight: bold; 
            z-index: 10; text-shadow: 0 0 10px var(--neon-blue);
        }

        #walletUi { color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold); }

        .icon-btn { 
            position: absolute; background: rgba(233, 69, 96, 0.2); 
            color: white; border: 1px solid var(--neon-pink); border-radius: 12px; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; 
            z-index: 30; transition: 0.3s;
        }
        #pauseBtn { bottom: 25px; right: 25px; width: 60px; height: 60px; font-size: 24px; }
        #settingsBtn { bottom: 25px; left: 25px; width: 60px; height: 60px; font-size: 24px; }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5, 5, 20, 0.95); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            color: white; z-index: 100; backdrop-filter: blur(8px); 
        }
        .panel { 
            background: #16213e; padding: 35px; border-radius: 30px; 
            border: 2px solid var(--neon-blue); width: 85%; max-width: 350px; 
            text-align: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .main-btn { 
            background: var(--neon-blue); color: #000; border: none; 
            padding: 12px 30px; border-radius: 50px; font-weight: bold; 
            cursor: pointer; margin-top: 15px; font-size: 16px;
        }
        .main-btn:disabled {
            background: #555; color: #aaa; cursor: not-allowed;
        }

        .ad-container { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ad-timer { font-size: 48px; color: var(--neon-pink); font-weight: bold; margin: 20px 0; }
        .ad-box { width: 100%; min-height: 150px; background: #0f172a; border-radius: 15px; display: flex; justify-content: center; align-items: center; margin: 15px 0; border: 1px dashed #334155; overflow: hidden; }
   </style>
</head>
<body>
    <div id="ui">
        <div>ውጤት: <span id="score">0</span></div>
        <div id="walletUi">የአሁኑ ገቢ: <span id="balance">0</span> ብር</div>
        <div>ደረጃ: <span id="level">1</span></div>
    </div>

    <button id="settingsBtn" class="icon-btn" onclick="openSettings()">⚙️</button>
    <button id="pauseBtn" class="icon-btn" onclick="togglePause()">⏸</button>

    <div id="settingsMenu" class="overlay">
        <div class="panel">
            <h2>ማስተካከያ</h2>
            <div style="margin: 20px 0; text-align: left;">
                <label>የኳስ ፍጥነት</label>
                <input type="range" id="speedRange" min="3" max="15" value="6" onchange="updateSettings()" style="width: 100%;">
            </div>
            <button class="main-btn" onclick="closeSettings()">ተመለስ</button>
        </div>
    </div>

    <div id="msgOverlay" class="overlay">
        <div class="panel">
            <h1 id="msgTitle" style="color: var(--neon-blue);">ደረጃ ተጠናቀቀ!</h1>
            <p id="msgText">በጣም ጎበዝ ነህ!</p>
            <button id="msgBtn" class="main-btn" onclick="handleMsgBtn()">ቀጥል ▶️</button>
            <button id="restartBtn" class="main-btn" style="background:#e94560; display:none;" onclick="forceRestart()">ከመጀመሪያው ጀምር 🔄</button>
        </div>
    </div>

    <div id="adOverlay" class="overlay">
        <div class="panel ad-container">
            <h2 id="adTitle" style="color: var(--neon-pink); margin: 0;">ማስታወቂያ</h2>
            <p id="adDesc" style="margin: 5px 0; color: #ccc;">ደረጃውን ለማዳን እባክዎ በትዕግስት ይጠብቁ...</p>
            
            <div class="ad-box">
                <div id="container-d9c95bb7e605081de3e961cccc14a6a6"></div>
            </div>

            <div id="adTimer" class="ad-timer">30</div>
            <button id="adCloseBtn" class="main-btn" disabled onclick="closeAdVideo()">ማስታወቂያ ዝለል ⏩</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0, level = 1, isPaused = false, gameActive = true;
        let walletBalance = 0;
        let paddle, ball, bricks = [], particles = [], powerUps = [];
        let currentAdMode = "";
        let adCountdownTimer;

        const levelConfigs = [
            { rows: 3, cols: 5, speed: 5, paddleW: 160 },
            { rows: 4, cols: 6, speed: 6, paddleW: 140 },
            { rows: 5, cols: 7, speed: 7, paddleW: 120 },
            { rows: 6, cols: 8, speed: 8, paddleW: 100 },
            { rows: 7, cols: 9, speed: 9, paddleW: 90 },
            { rows: 8, cols: 10, speed: 10, paddleW: 80 }
        ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const config = levelConfigs[Math.min(level - 1, levelConfigs.length - 1)];

            paddle = { 
                w: config.paddleW, h: 15, 
                x: (canvas.width - config.paddleW)/2, 
                y: canvas.height - 60, 
                color: '#00f2ff' 
            };
            ball = { x: canvas.width/2, y: paddle.y - 20, r: 8, dx: config.speed, dy: -config.speed };
            
            const bW = 45; 
            const bH = 22; 
            bricks = [];

            let centerX = Math.floor(config.cols / 2);
            let centerY = Math.floor(config.rows / 2);
            let offSetX = (canvas.width - (config.cols * bW)) / 2;

            for(let c=0; c < config.cols; c++) {
                bricks[c] = [];
                for(let r=0; r < config.rows; r++) {
                    let showBrick = false;
                    
                    if (level === 1) {
                        if (r <= c && r <= (config.cols - 1 - c)) showBrick = true;
                    } 
                    else if (level === 2) {
                        let dist = Math.abs(c - centerX) + Math.abs(r - centerY);
                        if (dist <= centerX) showBrick = true;
                    } 
                    else if (level === 3) {
                        let dist1 = Math.sqrt((c - 2)**2 + (r - 2)**2);
                        let dist2 = Math.sqrt((c - (config.cols-3))**2 + (r - 2)**2);
                        if (dist1 < 3 || dist2 < 3) showBrick = true;
                    } 
                    else {
                        if (c === centerX || r === centerY || c === 0 || c === config.cols-1) showBrick = true;
                    }

                    if(showBrick) {
                        bricks[c][r] = { 
                            x: offSetX + (c * bW), 
                            y: r * bH + 120, 
                            w: bW - 4, h: bH - 4, 
                            status: 1, 
                            color: `hsl(${(level * 60) + (r * 15)}, 85%, 60%)` 
                        };
                    } else {
                        bricks[c][r] = { status: 0 };
                    }
                }
            }
            particles = []; powerUps = [];
            document.getElementById('level').innerText = level;
            document.getElementById('balance').innerText = walletBalance;
        }

        function createParticles(x, y, color) {
            for(let i=0; i<6; i++) {
                particles.push({ x, y, dx: (Math.random()-0.5)*4, dy: (Math.random()-0.5)*4, life: 1, color });
            }
        }

        function update() {
            if(isPaused || !gameActive) return;

            ball.x += ball.dx; ball.y += ball.dy;

            if(ball.x + ball.r > canvas.width || ball.x - ball.r < 0) ball.dx *= -1;
            if(ball.y - ball.r < 0) ball.dy *= -1;

            if (ball.dy > 0 && 
                ball.y + ball.r >= paddle.y && 
                ball.y + ball.r <= paddle.y + paddle.h &&
                ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                
                let hitPos = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
                let speed = Math.sqrt(ball.dx**2 + ball.dy**2);
                ball.dx = speed * hitPos;
                ball.dy = -Math.sqrt(speed**2 - ball.dx**2);
                ball.y = paddle.y - ball.r; 
                playSound(440);
            }

            if(ball.y - ball.r > canvas.height) {
                gameActive = false;
                showLoseMessage();
            }

            let activeCount = 0;
            bricks.flat().forEach(b => {
                if(b.status === 1) {
                    activeCount++;
                    if(ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                        ball.dy *= -1; b.status = 0; score += 10;
                        document.getElementById('score').innerText = score;
                        createParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                        playSound(550);
                        if(Math.random() < 0.1) powerUps.push({x: b.x + b.w/2, y: b.y, dy: 3});
                    }
                }
            });

            if(activeCount === 0 && bricks.length > 0) {
                gameActive = false;
                if(level === 5) {
                    walletBalance += 1;
                    document.getElementById('balance').innerText = walletBalance;
                    showMessage("ደረጃ 5 ተጠናቀቀ! 🥳", "እንኳን ደስ አለህ! 1 ብር አግኝተሃል! አሁን አካውንትህ ላይ " + walletBalance + " ብር አለ", "ወደ ቀጣዩ ደረጃ ▶️");
                } else {
                    showMessage("ደረጃ " + level + " ተጠናቀቀ!", "በጣም ጎበዝ! ወደ ቀጣዩ ደረጃ ለመለፍ ተዘጋጅ", "ቀጥል ▶️");
                }
            }

            powerUps.forEach((p, i) => {
                p.y += p.dy;
                if(p.y > paddle.y && p.x > paddle.x && p.x < paddle.x + paddle.w) {
                    paddle.w += 30; setTimeout(() => paddle.w -= 30, 5000);
                    powerUps.splice(i, 1);
                    playSound(660);
                }
            });

            particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            bricks.flat().forEach(b => {
                if(b.status === 1) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            });

            ctx.fillStyle = paddle.color;
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();

            powerUps.forEach(p => { ctx.fillStyle = '#ff0'; ctx.fillText('⭐', p.x, p.y); });
            particles.forEach(p => {
                ctx.fillStyle = `rgba(0, 242, 255, ${p.life})`;
                ctx.fillRect(p.x, p.y, 3, 3);
            });

            update(); requestAnimationFrame(draw);
        }

        function showMessage(title, text, btnText) {
            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgText').innerText = text;
            document.getElementById('msgBtn').innerText = btnText;
            document.getElementById('msgBtn').style.display = 'inline-block';
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('msgOverlay').style.display = 'flex';
            isPaused = true;
        }

        function showLoseMessage() {
            document.getElementById('msgTitle').innerText = "ተሸንፈሃል! 💔";
            document.getElementById('msgTitle').style.color = '#e94560';
            document.getElementById('msgText').innerText = "የደረስክበት ደረጃ " + level + " እንዳይጠፋብህ 30 ሰከንድ ማስታወቂያ አይተህ መቀጠል ትፈልጋለህ?";
            document.getElementById('msgBtn').innerText = "ማስታወቂያ አይቼ ልቀጥል 🎬";
            document.getElementById('msgBtn').style.display = 'inline-block';
            document.getElementById('restartBtn').style.display = 'inline-block';
            document.getElementById('msgOverlay').style.display = 'flex';
            isPaused = true;
        }

        function handleMsgBtn() {
            document.getElementById('msgOverlay').style.display = 'none';
            if (document.getElementById('msgTitle').innerText.includes("ተሸንፈሃል!")) {
                startAdTimer(30, "rewarded");
            } else {
                startAdTimer(5, "interstitial");
            }
        }

        function forceRestart() {
            document.getElementById('msgOverlay').style.display = 'none';
            score = 0; level = 1; gameActive = true; isPaused = false;
            document.getElementById('score').innerText = 0;
            init();
        }

        function startAdTimer(seconds, mode) {
            currentAdMode = mode;
            isPaused = true;
            const adOverlay = document.getElementById('adOverlay');
            const adTimer = document.getElementById('adTimer');
            const adCloseBtn = document.getElementById('adCloseBtn');

            adTimer.innerText = seconds;
            adCloseBtn.disabled = true;
            adCloseBtn.innerText = "ይጠብቁ...";
            adOverlay.style.display = 'flex';

            let timeLeft = seconds;
            adCountdownTimer = setInterval(() => {
                timeLeft--;
                adTimer.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(adCountdownTimer);
                    adCloseBtn.disabled = false;
                    adCloseBtn.innerText = "ማስታወቂያ ዝለል ⏩";
                }
            }, 1000);
        }

        function closeAdVideo() {
            document.getElementById('adOverlay').style.display = 'none';
            clearInterval(adCountdownTimer);
            if(currentAdMode === "rewarded") {
                gameActive = true; isPaused = false; init();
            } else {
                level++; gameActive = true; isPaused = false; init();
            }
        }

        function updateSettings() {
            let val = parseInt(document.getElementById('speedRange').value);
            let s = Math.sqrt(ball.dx**2 + ball.dy**2);
            ball.dx *= (val/s); ball.dy *= (val/s);
        }

        function openSettings() { isPaused = true; document.getElementById('settingsMenu').style.display = 'flex'; }
        function closeSettings() { isPaused = false; document.getElementById('settingsMenu').style.display = 'none'; }
        function togglePause() { isPaused = !isPaused; document.getElementById('pauseBtn').innerText = isPaused ? '▶️' : '⏸'; }

        const move = e => {
            let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            paddle.x = Math.max(0, Math.min(x - paddle.w/2, canvas.width - paddle.w));
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', e => { e.preventDefault(); move(e); }, {passive: false});

        init(); draw();
    </script>
</body>
</html>
